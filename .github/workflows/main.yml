name: 🤖 Bot Magang Harian

on:
  schedule:
    - cron: '0 1 * * 1-5'  # Jam 08:00 WIB (UTC+7 → UTC 01:00), Senin–Jumat
    - cron: '0 8 * * 1-5'  # Jam 15:00 WIB (UTC+7 → UTC 08:00), Senin–Jumat
    - cron: '0 13 * * 1-5' # Jam 20:00 WIB (UTC+7 → UTC 13:00), Senin–Jumat
  workflow_dispatch:        # Tetap bisa dijalankan manual kapan saja

concurrency:
  group: bot-magang
  cancel-in-progress: true  # Hindari jalan ganda jika trigger dobel

jobs:
  jalankan-bot:
    name: Cari & Kirim Info Magang
    runs-on: ubuntu-latest
    timeout-minutes: 10     # Paksa berhenti jika hang (hemat menit Actions)

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'          # Cache dependensi agar install lebih cepat

      - name: 📦 Install dependensi
        run: pip install --quiet requests beautifulsoup4

      # Ambil riwayat dari cache antar-run agar anti-duplikat tetap bekerja
      - name: 💾 Restore cache riwayat
        uses: actions/cache@v4
        with:
          path: riwayat_lowongan.json
          key: riwayat-${{ runner.os }}

      - name: 🤖 Jalankan bot magang
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python bot_magang_dicky.py

      # Simpan kembali riwayat agar tersedia di run berikutnya
      - name: 💾 Simpan cache riwayat
        if: always()           # Simpan meski script error sekalipun
        uses: actions/cache@v4
        with:
          path: riwayat_lowongan.json
          key: riwayat-${{ runner.os }}

      - name: 📋 Upload log sebagai artefak
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-bot-${{ github.run_number }}
          path: bot_magang.log
          retention-days: 7    # Log dihapus otomatis setelah seminggu
